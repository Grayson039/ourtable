<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Table — Auth & Onboarding</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #EDE8E2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Phone frame ── */
  .phone-outer {
    position: relative;
    filter: drop-shadow(0 28px 56px rgba(0,0,0,0.26));
  }
  .side-l {
    position: absolute; left: -4px; top: 108px;
    width: 4px; height: 32px;
    background: #1A1A1A; border-radius: 4px 0 0 4px;
    box-shadow: 0 46px 0 #1A1A1A;
  }
  .side-r {
    position: absolute; right: -4px; top: 130px;
    width: 4px; height: 64px;
    background: #1A1A1A; border-radius: 0 4px 4px 0;
  }
  .phone-body {
    width: 370px; height: 760px;
    background: #0D0D0D; border-radius: 54px; padding: 12px;
    border: 1px solid #1A1A1A;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.07), inset 0 -1px 0 rgba(0,0,0,0.5);
  }
  #phone-screen {
    width: 100%; height: 100%;
    border-radius: 44px; overflow: hidden;
    position: relative;
    transition: background 0.3s ease;
  }

  /* ── Controls below phone ── */
  .controls {
    text-align: center;
    margin-top: 24px;
  }
  #screen-label {
    font-size: 11px; font-weight: 700;
    color: #8A7060; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .hint { font-size: 11px; color: #B0A090; margin-bottom: 14px; }
  #screen-dots {
    display: flex; gap: 7px; align-items: center;
    justify-content: center; margin-bottom: 14px;
  }
  #screen-dots .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #C8B8A8; transition: all 0.2s;
  }
  #screen-dots .dot.on {
    width: 22px; border-radius: 4px; background: #1B3A5C;
  }
  .theme-btn {
    background: rgba(0,0,0,0.07); border: 1.5px solid rgba(0,0,0,0.14);
    color: #2C2416; font-size: 12px; font-weight: 600;
    padding: 8px 20px; border-radius: 100px;
    cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
  }
</style>
</head>
<body>

<div class="phone-outer">
  <div class="side-l"></div>
  <div class="side-r"></div>
  <div class="phone-body">
    <div id="phone-screen"></div>
  </div>
</div>

<div class="controls">
  <div id="screen-label">Welcome</div>
  <div class="hint">Tap elements inside the phone to navigate</div>
  <div id="screen-dots"></div>
  <button class="theme-btn" id="theme-btn" onclick="otToggleTheme()">☾ Dark Mode</button>
</div>

<script src="./our-table-design-system.js"></script>
<script>
(function () {
  var T = OT.T, S = OT.S, R = OT.R, c = OT.c;

  /* ── Constants ─────────────────────────────────────────── */
  var DIET_OPTS = ['None','Vegetarian','Vegan','Gluten-Free','Dairy-Free','Nut-Free','Halal','Kosher'];
  var FLOW_SCREENS = ['welcome','signIn','createAccount','householdSetup'];
  var SCREEN_NAMES = {
    welcome:        'Welcome',
    signIn:         'Sign In',
    forgotPassword: 'Forgot Password',
    createAccount:  'Create Account',
    householdSetup: 'Your Household',
    complete:       'All Done'
  };

  /* ── Apple logo SVG (used on sign-in + create account) ─── */
  var APPLE_SVG = '<svg width="16" height="16" viewBox="0 0 814 1000" style="flex-shrink:0">' +
    '<path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 ' +
    '141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 ' +
    '790.7 0 663 0 541.8c0-194.3 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 ' +
    '130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 ' +
    '75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>' +
    '</svg>';

  function appleBtnStyle(th) {
    return 'width:100%;padding:12px;border-radius:' + R.md + ';border:1.5px solid ' + th.border + ';' +
      'background:transparent;color:' + th.text + ';font-size:13px;font-weight:600;cursor:pointer;' +
      'font-family:' + T.sans + ';display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px';
  }

  /* ══════════════════════════════════════════════════════════
     SCREENS
  ══════════════════════════════════════════════════════════ */

  /* ── 1. WELCOME ─────────────────────────────────────────── */
  function sWelcome(th) {
    return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
      'position:relative;overflow:hidden;font-family:' + T.sans + '">' +

      /* Decorative background blobs */
      '<div style="position:absolute;top:-80px;right:-80px;width:260px;height:260px;' +
        'border-radius:50%;background:' + th.primary + ';opacity:0.07;pointer-events:none"></div>' +
      '<div style="position:absolute;bottom:130px;left:-70px;width:200px;height:200px;' +
        'border-radius:50%;background:' + th.hero2 + ';opacity:0.25;pointer-events:none"></div>' +

      c.notch() + c.statusBar(th) +

      /* ── Main content ── */
      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;' +
        'justify-content:center;padding:0 32px 20px">' +

        /* Logo mark */
        '<div style="width:82px;height:82px;background:' + th.primary + ';border-radius:28px;' +
          'display:flex;align-items:center;justify-content:center;margin:0 auto 18px;' +
          'box-shadow:0 18px 40px ' + th.primary + '50">' +
          '<svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="white" ' +
            'stroke-width="1.8" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1' +
            'M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>' +
        '</div>' +

        /* Wordmark */
        '<div style="font-size:38px;font-weight:800;color:' + th.primary + ';' +
          'font-family:' + T.serif + ';line-height:1;margin-bottom:12px">Our Table</div>' +

        /* Tagline */
        '<div style="font-size:14px;color:' + th.muted + ';text-align:center;' +
          'line-height:1.7;max-width:220px">Save recipes. Know your fridge.<br>Cook for everyone.</div>' +

        '<div style="height:28px"></div>' +

        /* Value props */
        '<div style="display:flex;flex-direction:column;gap:8px;width:100%">' +
          [['📱','Import from TikTok, Instagram & any food blog'],
           ['❄️','Scan your fridge — get instant recipe ideas'],
           ['👨‍👩‍👧','Built for the whole household, not just you']
          ].map(function (row) {
            return '<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;' +
              'border-radius:' + R.sm + ';background:' + th.chip + ';border:0.5px solid ' + th.border + '">' +
              '<span style="font-size:18px;flex-shrink:0">' + row[0] + '</span>' +
              '<span style="font-size:12px;color:' + th.text + ';font-weight:500;line-height:1.4">' + row[1] + '</span>' +
            '</div>';
          }).join('') +
        '</div>' +

      '</div>' +

      /* ── Bottom CTA ── */
      '<div style="padding:0 28px 44px;display:flex;flex-direction:column;gap:12px">' +
        c.btn(th, 'Get Started', "otGo('createAccount')", 'primary') +
        c.btn(th, 'Sign In', "otGo('signIn')", 'secondary') +
        '<div style="text-align:center;font-size:11px;color:' + th.muted + '">' +
          'By continuing you agree to our <span style="text-decoration:underline;cursor:pointer">Terms of Service</span>' +
        '</div>' +
      '</div>' +

    '</div>';
  }

  /* ── 2. SIGN IN ─────────────────────────────────────────── */
  function sSignIn(th) {
    return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
      'overflow:hidden;font-family:' + T.sans + '">' +

      c.notch() + c.statusBar(th) +
      '<div style="padding:4px ' + S.xl + ' 0">' + c.backBtn(th) + '</div>' +

      '<div style="flex:1;padding:8px 28px 28px;overflow-y:auto;display:flex;flex-direction:column">' +

        '<div style="font-size:30px;font-weight:800;color:' + th.text + ';font-family:' + T.serif + ';' +
          'margin-bottom:6px;line-height:1.15">Welcome<br>back 👋</div>' +
        '<div style="font-size:13px;color:' + th.muted + ';margin-bottom:26px">' +
          'Sign in to your Our Table account</div>' +

        c.field(th, 'si-email', 'email', 'Email', 'your@email.com', 'will@ourtable.app') +
        '<div style="height:12px"></div>' +
        c.field(th, 'si-pass', 'password', 'Password', 'Enter your password', '') +

        '<div style="text-align:right;margin:10px 0 22px">' +
          '<span onclick="otGo(\'forgotPassword\')" style="font-size:12px;color:' + th.primary + ';' +
            'font-weight:600;cursor:pointer">Forgot password?</span>' +
        '</div>' +

        c.btn(th, 'Sign In', "otGo('complete')", 'primary') +
        c.divider(th, 'or') +

        '<button onclick="otGo(\'complete\')" style="' + appleBtnStyle(th) + '">' +
          APPLE_SVG + ' Continue with Apple' +
        '</button>' +

        '<div style="text-align:center;font-size:13px;color:' + th.muted + '">' +
          'No account? <span onclick="otGo(\'createAccount\')" style="color:' + th.primary + ';' +
          'font-weight:600;cursor:pointer">Sign up free</span>' +
        '</div>' +

      '</div>' +
    '</div>';
  }

  /* ── 3. FORGOT PASSWORD ─────────────────────────────────── */
  function sForgotPassword(th, st) {
    var sent = st.resetSent;

    return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
      'overflow:hidden;font-family:' + T.sans + '">' +

      c.notch() + c.statusBar(th) +
      '<div style="padding:4px ' + S.xl + ' 0">' + c.backBtn(th) + '</div>' +

      '<div style="flex:1;padding:12px 28px 28px;display:flex;flex-direction:column">' +

        (sent ?
          /* Success state */
          '<div style="flex:1;display:flex;flex-direction:column;align-items:center;' +
            'justify-content:center;text-align:center;padding:20px">' +
            '<div style="font-size:60px;margin-bottom:22px">📬</div>' +
            '<div style="font-size:26px;font-weight:800;color:' + th.text + ';font-family:' + T.serif + ';' +
              'margin-bottom:10px;line-height:1.2">Check your<br>inbox</div>' +
            '<div style="font-size:14px;color:' + th.muted + ';line-height:1.7;margin-bottom:10px">' +
              'We sent a reset link to</div>' +
            '<div style="font-size:14px;font-weight:700;color:' + th.text + ';margin-bottom:32px">' +
              (st.resetEmail || 'your email address') + '</div>' +
            c.btn(th, '← Back to Sign In', "otGo('signIn')", 'secondary') +
          '</div>'
        :
          /* Form state */
          '<div style="font-size:26px;font-weight:800;color:' + th.text + ';font-family:' + T.serif + ';' +
            'line-height:1.2;margin-bottom:6px">Reset your<br>password 🔑</div>' +
          '<div style="font-size:13px;color:' + th.muted + ';margin-bottom:28px">' +
            'Enter your email and we\'ll send a reset link</div>' +
          c.field(th, 'fp-email', 'email', 'Email address', 'your@email.com', '') +
          '<div style="height:22px"></div>' +
          c.btn(th, 'Send Reset Link', 'otSendReset()', 'primary') +
          '<div style="height:16px"></div>' +
          c.btn(th, 'Cancel', "otBack()", 'secondary')
        ) +

      '</div>' +
    '</div>';
  }

  /* ── 4. CREATE ACCOUNT ──────────────────────────────────── */
  function sCreateAccount(th) {
    return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
      'overflow:hidden;font-family:' + T.sans + '">' +

      c.notch() + c.statusBar(th) +

      '<div style="padding:4px ' + S.xl + ' 0;display:flex;justify-content:space-between;align-items:center">' +
        c.backBtn(th) +
        c.stepDots(th, 0, 2) +
      '</div>' +

      '<div style="flex:1;padding:10px 28px 28px;overflow-y:auto;display:flex;flex-direction:column">' +

        '<div style="font-size:28px;font-weight:800;color:' + th.text + ';font-family:' + T.serif + ';' +
          'line-height:1.2;margin-bottom:6px">Create your<br>account</div>' +
        '<div style="font-size:13px;color:' + th.muted + ';margin-bottom:22px">' +
          'Join thousands of households cooking better</div>' +

        /* First + last name row */
        '<div style="display:flex;gap:10px;margin-bottom:12px">' +
          '<div style="flex:1">' + c.field(th, 'ca-fname', 'text', 'First name', 'Will', '') + '</div>' +
          '<div style="flex:1">' + c.field(th, 'ca-lname', 'text', 'Last name', 'Grayson', '') + '</div>' +
        '</div>' +

        c.field(th, 'ca-email', 'email', 'Email', 'your@email.com', '') +
        '<div style="height:12px"></div>' +
        c.field(th, 'ca-pass', 'password', 'Password', 'Create a password', '') +

        '<div style="font-size:11px;color:' + th.muted + ';margin:6px 0 20px">' +
          '🔒 At least 8 characters</div>' +

        c.btn(th, 'Continue →', 'otContinueSignUp()', 'primary') +
        c.divider(th, 'or') +

        '<button onclick="otGo(\'householdSetup\')" style="' + appleBtnStyle(th) + '">' +
          APPLE_SVG + ' Continue with Apple' +
        '</button>' +

        '<div style="text-align:center;font-size:13px;color:' + th.muted + '">' +
          'Already have an account? <span onclick="otGo(\'signIn\')" style="color:' + th.primary + ';' +
          'font-weight:600;cursor:pointer">Sign in</span>' +
        '</div>' +

      '</div>' +
    '</div>';
  }

  /* ── 5. HOUSEHOLD SETUP ─────────────────────────────────── */
  function sHouseholdSetup(th, st) {

    /* Member chips */
    var memberChips =
      '<div style="display:flex;align-items:center;gap:7px;background:' + th.primary + ';' +
        'border-radius:' + R.pill + ';padding:7px 14px;flex-shrink:0">' +
        '<div style="width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.3);' +
          'display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white">' +
          (st.firstName || 'Y')[0].toUpperCase() +
        '</div>' +
        '<span style="font-size:12px;font-weight:600;color:white">' + (st.firstName || 'You') + '</span>' +
      '</div>';

    st.members.forEach(function (m) {
      memberChips +=
        '<div style="display:flex;align-items:center;gap:7px;background:' + th.chip + ';' +
          'border-radius:' + R.pill + ';padding:7px 14px;flex-shrink:0;border:1px solid ' + th.border + '">' +
          '<div style="width:20px;height:20px;border-radius:50%;background:' + th.secondary + ';' +
            'display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white">' +
            m.name[0].toUpperCase() +
          '</div>' +
          '<span style="font-size:12px;font-weight:600;color:' + th.text + '">' + m.name + '</span>' +
          '<span onclick="otRemoveMember(\'' + m.name + '\')" style="font-size:15px;color:' + th.muted + ';' +
            'cursor:pointer;margin-left:2px;line-height:1">×</span>' +
        '</div>';
    });

    /* Dietary chips */
    var dietHtml = DIET_OPTS.map(function (opt) {
      return c.dietTag(th, opt, st.dietary.indexOf(opt) >= 0, 'otToggleDietary(\'' + opt + '\')');
    }).join(' ');

    /* Add-member bottom sheet (shown conditionally) */
    var addSheet = st.showAddMember ?
      '<div onclick="otHideAddMember()" style="position:absolute;inset:0;background:' + th.overlay + ';' +
        'z-index:40;display:flex;align-items:flex-end">' +
        '<div onclick="event.stopPropagation()" style="width:100%;background:' + th.card + ';' +
          'border-radius:20px 20px 0 0;padding:20px 24px 40px">' +

          /* Sheet handle */
          '<div style="width:40px;height:4px;border-radius:' + R.pill + ';background:' + th.border + ';' +
            'margin:0 auto 18px"></div>' +

          '<div style="font-size:18px;font-weight:700;color:' + th.text + ';font-family:' + T.serif + ';' +
            'margin-bottom:16px">Add household member</div>' +

          c.field(th, 'nm-name', 'text', 'Name', 'Their first name', '') +
          '<div style="height:14px"></div>' +
          '<div style="font-size:12px;font-weight:600;color:' + th.text + ';margin-bottom:8px">Dietary needs</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px">' +
            DIET_OPTS.map(function (opt) {
              return c.dietTag(th, opt, st.newMemberDietary.indexOf(opt) >= 0,
                'otToggleNewMemberDietary(\'' + opt + '\')');
            }).join(' ') +
          '</div>' +
          c.btn(th, 'Add to household', 'otAddMember()', 'primary') +
        '</div>' +
      '</div>'
    : '';

    return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
      'overflow:hidden;font-family:' + T.sans + ';position:relative">' +

      c.notch() + c.statusBar(th) +

      '<div style="padding:4px ' + S.xl + ' 0;display:flex;justify-content:space-between;align-items:center">' +
        c.backBtn(th) +
        c.stepDots(th, 1, 2) +
      '</div>' +

      '<div style="flex:1;padding:10px 28px 28px;overflow-y:auto;display:flex;flex-direction:column">' +

        '<div style="font-size:26px;font-weight:800;color:' + th.text + ';font-family:' + T.serif + ';' +
          'line-height:1.2;margin-bottom:6px">Who\'s at your<br>table? 👨‍👩‍👧</div>' +
        '<div style="font-size:13px;color:' + th.muted + ';margin-bottom:20px;line-height:1.6">' +
          'We\'ll tailor every recipe, suggestion, and grocery list to fit everyone\'s needs</div>' +

        /* Members section */
        '<div style="font-size:13px;font-weight:700;color:' + th.text + ';margin-bottom:10px">' +
          'Household members</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;align-items:center">' +
          memberChips +
          '<div onclick="otShowAddMember()" style="display:flex;align-items:center;gap:6px;' +
            'border-radius:' + R.pill + ';padding:7px 14px;' +
            'border:1.5px dashed ' + th.border + ';cursor:pointer;flex-shrink:0">' +
            '<span style="font-size:18px;line-height:1;color:' + th.muted + '">+</span>' +
            '<span style="font-size:12px;color:' + th.muted + '">Add member</span>' +
          '</div>' +
        '</div>' +

        /* Dietary section */
        '<div style="font-size:13px;font-weight:700;color:' + th.text + ';margin-bottom:4px">' +
          'Your dietary preferences</div>' +
        '<div style="font-size:12px;color:' + th.muted + ';margin-bottom:12px">' +
          'Select all that apply — we\'ll flag conflicts automatically</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px">' +
          dietHtml +
        '</div>' +

        c.btn(th, 'Get Cooking 🍳', "otGo('complete')", 'primary') +

      '</div>' +

      addSheet +
    '</div>';
  }

  /* ── 6. COMPLETE (handoff) ──────────────────────────────── */
  function sComplete(th, st) {
    var name = st.firstName || 'Will';
    var memberCount = st.members.length + 1;
    var dietCount = st.dietary.length;

    return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
      'align-items:center;justify-content:center;font-family:' + T.sans + ';padding:40px;text-align:center;' +
      'position:relative;overflow:hidden">' +

      c.notch() +

      /* Decorative blobs */
      '<div style="position:absolute;top:-60px;right:-60px;width:200px;height:200px;' +
        'border-radius:50%;background:' + th.secondary + ';opacity:0.12;pointer-events:none"></div>' +
      '<div style="position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;' +
        'border-radius:50%;background:' + th.primary + ';opacity:0.1;pointer-events:none"></div>' +

      /* Icon */
      '<div style="width:80px;height:80px;background:' + th.secondary + ';border-radius:28px;' +
        'display:flex;align-items:center;justify-content:center;margin:0 auto 20px;' +
        'box-shadow:0 16px 36px ' + th.secondary + '44;font-size:40px">🎉</div>' +

      /* Heading */
      '<div style="font-size:28px;font-weight:800;color:' + th.text + ';font-family:' + T.serif + ';' +
        'line-height:1.2;margin-bottom:10px">You\'re all set,<br>' + name + '!</div>' +

      '<div style="font-size:14px;color:' + th.muted + ';line-height:1.7;margin-bottom:28px">' +
        'Your table is set. Every recipe, suggestion, and grocery list will be tailored for your whole household.</div>' +

      /* Summary pills */
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:32px">' +
        '<div style="padding:8px 16px;border-radius:' + R.pill + ';background:' + th.chip + ';' +
          'border:0.5px solid ' + th.border + ';font-size:12px;color:' + th.text + ';font-weight:600">' +
          '👥 ' + memberCount + ' member' + (memberCount !== 1 ? 's' : '') +
        '</div>' +
        '<div style="padding:8px 16px;border-radius:' + R.pill + ';background:' + th.chip + ';' +
          'border:0.5px solid ' + th.border + ';font-size:12px;color:' + th.text + ';font-weight:600">' +
          '🥗 ' + (dietCount > 0 ? dietCount + ' dietary pref' + (dietCount !== 1 ? 's' : '') : 'No restrictions') +
        '</div>' +
      '</div>' +

      c.btn(th, "Let's get cooking →", "otGo('welcome')", 'primary') +
      '<div style="height:10px"></div>' +
      c.btn(th, '← Edit household', "otGo('householdSetup')", 'secondary') +

    '</div>';
  }

  /* ══════════════════════════════════════════════════════════
     NAVIGATION SETUP
  ══════════════════════════════════════════════════════════ */

  OT.nav(
    {
      welcome:        sWelcome,
      signIn:         sSignIn,
      forgotPassword: sForgotPassword,
      createAccount:  sCreateAccount,
      householdSetup: sHouseholdSetup,
      complete:       sComplete
    },
    'welcome',
    'phone-screen',
    {
      mainScreens: ['welcome'],
      state: {
        firstName:        'Will',
        dietary:          [],
        members:          [],
        newMemberDietary: [],
        showAddMember:    false,
        resetSent:        false,
        resetEmail:       ''
      },
      onRender: function (st, th) {
        var lbl = document.getElementById('screen-label');
        if (lbl) lbl.textContent = SCREEN_NAMES[st.cur] || st.cur;

        var dotsEl = document.getElementById('screen-dots');
        if (dotsEl) {
          dotsEl.innerHTML = FLOW_SCREENS.map(function (s) {
            return '<div class="dot' + (s === st.cur ? ' on' : '') + '"></div>';
          }).join('');
        }

        var tbtn = document.getElementById('theme-btn');
        if (tbtn) tbtn.textContent = (st.dark ? '☀' : '☾') + ' ' + (st.dark ? 'Light' : 'Dark') + ' Mode';
      }
    }
  );

  /* ══════════════════════════════════════════════════════════
     INTERACTION HANDLERS
  ══════════════════════════════════════════════════════════ */

  /* Read name from form and advance to household setup */
  window.otContinueSignUp = function () {
    var fn = document.getElementById('ca-fname');
    var ln = document.getElementById('ca-lname');
    if (fn && fn.value.trim()) otState.firstName = fn.value.trim();
    otGo('householdSetup');
  };

  /* Dietary preferences for the primary user */
  window.otToggleDietary = function (opt) {
    var idx = otState.dietary.indexOf(opt);
    if (idx >= 0) otState.dietary.splice(idx, 1); else otState.dietary.push(opt);
    otRender();
  };

  /* Show / hide add-member sheet */
  window.otShowAddMember = function () {
    otState.showAddMember = true;
    otState.newMemberDietary = [];
    otRender();
  };
  window.otHideAddMember = function () {
    otState.showAddMember = false;
    otRender();
  };

  /* Dietary for the new member being added */
  window.otToggleNewMemberDietary = function (opt) {
    var idx = otState.newMemberDietary.indexOf(opt);
    if (idx >= 0) otState.newMemberDietary.splice(idx, 1); else otState.newMemberDietary.push(opt);
    otRender();
  };

  /* Confirm adding the new member */
  window.otAddMember = function () {
    var nameEl = document.getElementById('nm-name');
    var name = nameEl ? nameEl.value.trim() : '';
    if (!name) return;
    otState.members.push({ name: name, dietary: otState.newMemberDietary.slice() });
    otState.showAddMember = false;
    otState.newMemberDietary = [];
    otRender();
  };

  /* Remove a member by name */
  window.otRemoveMember = function (name) {
    otState.members = otState.members.filter(function (m) { return m.name !== name; });
    otRender();
  };

  /* Forgot password — send reset link */
  window.otSendReset = function () {
    var el = document.getElementById('fp-email');
    otState.resetEmail = el ? (el.value || 'your email address') : 'your email address';
    otState.resetSent = true;
    otRender();
  };

})();
</script>
</body>
</html>
