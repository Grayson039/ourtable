<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Table — Interactive Prototype</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EEF2F7;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 20px 60px}
.proto-header{text-align:center;margin-bottom:28px}
.proto-logo{font-size:11px;font-weight:800;letter-spacing:0.14em;color:#1B3A5C;text-transform:uppercase;margin-bottom:6px;opacity:.6}
.proto-title{font-size:26px;font-weight:800;color:#1A2E3D;letter-spacing:-0.02em;margin-bottom:3px}
.proto-sub{font-size:12px;color:#6B8090}
.proto-layout{display:flex;gap:32px;align-items:flex-start;max-width:860px;width:100%}
.phone-col{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:14px}
.phone-outer{position:relative;filter:drop-shadow(0 24px 48px rgba(0,0,0,0.28))}
.side-l{position:absolute;left:-4px;top:108px;width:4px;height:32px;background:#1A1A1A;border-radius:4px 0 0 4px;box-shadow:0 46px 0 #1A1A1A}
.side-r{position:absolute;right:-4px;top:130px;width:4px;height:64px;background:#1A1A1A;border-radius:0 4px 4px 0}
.phone-body{width:370px;height:760px;background:#0D0D0D;border-radius:54px;padding:12px;border:1px solid #1A1A1A;box-shadow:inset 0 1px 1px rgba(255,255,255,0.07),inset 0 -1px 0 rgba(0,0,0,.5)}
#phone-screen{width:100%;height:100%;border-radius:44px;overflow:hidden;position:relative}
.phone-controls{display:flex;align-items:center;gap:8px}
.screen-badge{display:inline-flex;align-items:center;gap:6px;background:white;border:1.5px solid #D0DCEB;border-radius:100px;padding:5px 14px;font-size:11px;font-weight:600;color:#1A2E3D;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.screen-dot{width:6px;height:6px;border-radius:50%;background:#1B3A5C;flex-shrink:0}
.theme-btn{background:white;border:1.5px solid #D0DCEB;color:#1A2E3D;font-size:12px;font-weight:600;padding:7px 16px;border-radius:100px;cursor:pointer;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .15s}
.theme-btn:hover{background:#F0F4F8}
.modules-col{flex:1;min-width:0}
.modules-label{font-size:10px;font-weight:800;letter-spacing:.1em;color:#8090A0;text-transform:uppercase;margin-bottom:10px}
.module-grid{display:flex;flex-direction:column;gap:7px}
.module-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;background:white;border:1.5px solid #D8E4EE;border-radius:14px;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;overflow:hidden}
.module-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;border-radius:0 2px 2px 0;transition:background .15s}
.module-btn:hover{border-color:#1B3A5C;background:#F4F8FC;transform:translateX(2px)}
.module-btn.active{border-color:#1B3A5C;background:#EBF1F8;box-shadow:0 2px 8px rgba(27,58,92,.1)}
.module-btn.active::before{background:#1B3A5C}
.mod-num{font-size:9px;font-weight:800;color:#1B3A5C;background:#E0EAF4;border:1px solid #C0D4E8;border-radius:5px;padding:2px 5px;letter-spacing:.04em;flex-shrink:0}
.module-btn.active .mod-num{background:#1B3A5C;color:white;border-color:#1B3A5C}
.mod-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.mod-info{flex:1;min-width:0}
.mod-title{font-size:13px;font-weight:700;color:#1A2E3D;margin-bottom:1px}
.mod-sub{font-size:11px;color:#7890A0}
.mod-arrow{font-size:15px;color:#B8CAD8;flex-shrink:0;transition:color .15s}
.module-btn:hover .mod-arrow,.module-btn.active .mod-arrow{color:#1B3A5C}
.proto-footer{margin-top:36px;text-align:center;font-size:11px;color:#9BAEBB;letter-spacing:.04em}
@media(max-width:680px){.proto-layout{flex-direction:column;align-items:center}.modules-col{width:100%;max-width:370px}}
</style>
</head>
<body>

<div class="proto-header">
  <div class="proto-logo">Our Table</div>
  <div class="proto-title">Interactive Prototype</div>
  <div class="proto-sub">8 screens · Select a module to explore</div>
</div>

<div class="proto-layout">
  <div class="phone-col">
    <div class="phone-outer">
      <div class="side-l"></div><div class="side-r"></div>
      <div class="phone-body"><div id="phone-screen"></div></div>
    </div>
    <div class="phone-controls">
      <div class="screen-badge"><div class="screen-dot"></div><span id="screen-label">Loading…</span></div>
      <button class="theme-btn" id="theme-btn" onclick="otToggleTheme()">☾ Dark</button>
    </div>
  </div>

  <div class="modules-col">
    <div class="modules-label">Screens</div>
    <div class="module-grid" id="module-grid"></div>
  </div>
</div>

<div class="proto-footer">Our Table &nbsp;·&nbsp; UX/UI Portfolio &nbsp;·&nbsp; 2025</div>

<script>
/**
 * Our Table — Shared Design System
 * ─────────────────────────────────────────────────────────────
 * Single source of truth for color tokens, typography, spacing,
 * and every reusable UI component used across all screen files.
 *
 * USAGE (in any prototype HTML file):
 *   [script src="our-table-design-system.js"][/script]
 *
 *   All tokens and components live on the global `OT` object.
 *   Pass OT.L (light theme) or OT.D (dark theme) as the first
 *   argument to any component function.
 *
 * QUICK REFERENCE:
 *   OT.L / OT.D                  — color theme objects
 *   OT.T                         — typography constants
 *   OT.S                         — spacing constants
 *   OT.R                         — border radius constants
 *   OT.c.statusBar(theme)        — iOS status bar
 *   OT.c.navBar(theme, activeIdx)— bottom tab bar (0–4)
 *   OT.c.btn(theme, label, fn, variant) — button
 *   OT.c.input(theme, id, type, placeholder, value)
 *   OT.c.recipeCardLarge(theme, recipe, onClickFn)
 *   OT.c.recipeCardSmall(theme, recipe, onClickFn)
 *   OT.c.listItem(theme, item, checked, onClickFn)
 *   OT.nav(screens, startId, containerId, opts) — wires navigation
 * ─────────────────────────────────────────────────────────────
 */

(function (global) {

  /* ══════════════════════════════════════════════════════════
     COLOR TOKENS
     All screens must import these rather than hardcoding hex
     values — this is how dark mode works for free.
  ══════════════════════════════════════════════════════════ */

  var L = {
    _name:     'light',
    bg:        '#F5F8FA',   // page / screen background
    card:      '#FFFFFF',   // card surfaces
    primary:   '#1B3A5C',   // navy — CTAs, active states
    secondary: '#7A8C52',   // sage green — success, checked items
    text:      '#1A2E3D',   // primary text
    muted:     '#6B7E8F',   // secondary / placeholder text
    border:    '#D8E2EC',   // dividers, card borders
    chip:      '#EBF0F5',   // filter pill backgrounds
    chipTx:    '#4A6070',   // filter pill text
    input:     '#FFFFFF',   // input field background
    // Hero placeholder colors (shown when no photo is available)
    hero:      '#1B3A5C',   // featured card — warm salmon
    hero2:     '#2E5C8A',   // secondary card — sage
    hero3:     '#0F2A48',   // tertiary card — deeper salmon
    // Semantic colors
    success:   '#5A8A52',
    warning:   '#C4884A',
    error:     '#B04040',
    // Overlay / scrim
    overlay:   'rgba(44,36,22,0.52)',
    scrim:     'rgba(0,0,0,0.28)'
  };

  var D = {
    _name:     'dark',
    bg:        '#1C1917',
    card:      '#2E2A27',
    primary:   '#4A8EC2',
    secondary: '#9AB86A',
    text:      '#FEFAF6',
    muted:     '#C8BAB2',
    border:    'rgba(255,255,255,0.15)',
    chip:      '#332F2C',
    chipTx:    '#D8CCC4',
    input:     '#242120',
    hero:      '#3A2220',
    hero2:     '#2A3820',
    hero3:     '#2E1A18',
    success:   '#7AB86A',
    warning:   '#D4A870',
    error:     '#D46A5A',
    overlay:   'rgba(0,0,0,0.62)',
    scrim:     'rgba(0,0,0,0.46)'
  };


  /* ══════════════════════════════════════════════════════════
     TYPOGRAPHY
  ══════════════════════════════════════════════════════════ */

  var T = {
    sans:  "-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif",
    serif: "'Playfair Display', Georgia, 'Times New Roman', serif",
    sz: {
      xxs:  '9px',   // decorative labels, badges
      xs:   '10px',  // timestamps, metadata
      sm:   '11px',  // chip labels, section labels
      base: '13px',  // body text, list items
      md:   '15px',  // sub-headings, button labels
      lg:   '18px',  // card titles
      xl:   '22px',  // page titles
      xxl:  '26px',  // onboarding headings
      hero: '32px'   // splash / welcome headings
    },
    wt: { reg: 400, med: 500, semi: 600, bold: 700, heavy: 800 }
  };


  /* ══════════════════════════════════════════════════════════
     SPACING  (use these rather than raw px values)
  ══════════════════════════════════════════════════════════ */

  var S = {
    xs:     '4px',
    sm:     '8px',
    md:     '12px',
    lg:     '16px',
    xl:     '22px',    // standard screen-edge padding
    xxl:    '32px',
    section:'14px'     // gap between UI sections
  };


  /* ══════════════════════════════════════════════════════════
     BORDER RADIUS
  ══════════════════════════════════════════════════════════ */

  var R = {
    xs:   '6px',
    sm:   '10px',
    md:   '13px',
    lg:   '16px',
    xl:   '20px',
    pill: '100px',
    full: '50%'
  };


  /* ══════════════════════════════════════════════════════════
     SHADOW HELPER
  ══════════════════════════════════════════════════════════ */

  function shadow(c, size) {
    if (size === 'sm')      return '0 2px 8px rgba(0,0,0,0.08)';
    if (size === 'lg')      return '0 12px 36px rgba(0,0,0,0.14)';
    if (size === 'primary') return '0 8px 20px ' + c.primary + '44';
    return '0 6px 20px rgba(0,0,0,0.10)'; // md (default)
  }


  /* ══════════════════════════════════════════════════════════
     COMPONENT FUNCTIONS
     Every function returns an HTML string.
     Prefix:  c  (short for "components")
  ══════════════════════════════════════════════════════════ */

  var c = {};

  /* ── Structural chrome ──────────────────────────────────── */

  c.notch = function () {
    return '<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);' +
      'width:90px;height:26px;background:#0D0D0D;border-radius:0 0 18px 18px;z-index:30"></div>';
  };

  /** Standard status bar (sits on bg color) */
  c.statusBar = function (theme) {
    var sig = '<svg width="17" height="12" viewBox="0 0 17 12">' +
      '<rect x="0" y="9" width="3" height="3" rx=".5" fill="' + theme.text + '"/>' +
      '<rect x="4.5" y="6" width="3" height="6" rx=".5" fill="' + theme.text + '"/>' +
      '<rect x="9" y="3" width="3" height="9" rx=".5" fill="' + theme.text + '"/>' +
      '<rect x="13.5" y="0" width="3" height="12" rx=".5" fill="' + theme.text + '"/></svg>';
    var bat = '<svg width="24" height="12" viewBox="0 0 24 12">' +
      '<rect x=".6" y="1" width="19.8" height="10" rx="2.5" stroke="' + theme.text + '" stroke-width="1.2" fill="none"/>' +
      '<rect x="20.6" y="3.8" width="2.8" height="4.4" rx="1.2" fill="' + theme.text + '" opacity=".5"/>' +
      '<rect x="2.2" y="2.6" width="16.6" height="6.8" rx="1.5" fill="' + theme.text + '"/></svg>';
    return '<div style="display:flex;justify-content:space-between;align-items:center;' +
      'padding:38px 22px 4px;font-size:12px;font-weight:600;font-family:' + T.sans + ';' +
      'color:' + theme.text + ';position:relative;z-index:5">' +
      '<span>9:41</span><div style="display:flex;align-items:center;gap:6px">' + sig + bat + '</div></div>';
  };

  /** Overlay status bar for screens whose hero image fills the top */
  c.statusBarOverlay = function () {
    return '<div style="position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;' +
      'align-items:center;padding:38px 22px 4px;font-size:12px;font-weight:600;' +
      'font-family:' + T.sans + ';color:white;z-index:20">' +
      '<span>9:41</span><span style="letter-spacing:2px">•••</span></div>';
  };

  /**
   * Bottom navigation bar.
   * @param {object} theme
   * @param {number} activeIdx  0=Home 1=Search 2=Fridge 3=List 4=Me
   * @param {string} goFn  name of global nav function (default: 'otGo')
   */
  c.navBar = function (theme, activeIdx, goFn) {
    var fn = goFn || 'otGo';
    var items = [
      ['Home',   'home',    'M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'],
      ['Search', 'search',  'M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z'],
      ['Fridge', 'fridge',  'M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm0 7h14'],
      ['List',   'list',    'M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-6 9l2 2 4-4'],
      ['Me',     'profile', 'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z']
    ];
    var html = '<div style="position:absolute;bottom:0;left:0;right:0;display:flex;' +
      'justify-content:space-around;align-items:center;padding:10px 0 22px;' +
      'border-top:0.5px solid ' + theme.border + ';background:' + theme.bg + ';z-index:10">';
    for (var i = 0; i < items.length; i++) {
      var col = i === activeIdx ? theme.primary : theme.muted;
      html += '<div onclick="' + fn + '(\'' + items[i][1] + '\')" style="display:flex;flex-direction:column;' +
        'align-items:center;gap:3px;font-size:9px;font-family:' + T.sans + ';color:' + col + ';cursor:pointer">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="' + col + '" ' +
        'stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="' + items[i][2] + '"/></svg>' +
        '<span>' + items[i][0] + '</span></div>';
    }
    return html + '</div>';
  };

  /** Back chevron with optional text label */
  c.backBtn = function (theme, label, onClickFn) {
    var fn = onClickFn || 'otBack()';
    return '<div onclick="' + fn + '" style="cursor:pointer;padding:4px;display:inline-flex;align-items:center;gap:4px">' +
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="' + theme.muted + '" stroke-width="2">' +
      '<path d="M15 18l-6-6 6-6"/></svg>' +
      (label ? '<span style="font-size:13px;color:' + theme.muted + ';font-family:' + T.sans + '">' + label + '</span>' : '') +
      '</div>';
  };

  /** Page header: optional back button, title, optional right-side element */
  c.pageHeader = function (theme, title, rightHtml, showBack, backLabel) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px ' + S.xl + ' 10px">' +
      (showBack ? c.backBtn(theme, backLabel) : '') +
      '<div style="flex:1' + (showBack ? ';margin-left:' + S.sm : '') + ';font-size:' + T.sz.xl + ';' +
      'font-weight:' + T.wt.heavy + ';color:' + theme.text + ';font-family:' + T.sans + '">' + title + '</div>' +
      (rightHtml ? '<div>' + rightHtml + '</div>' : '') +
    '</div>';
  };


  /* ── Buttons ────────────────────────────────────────────── */

  /**
   * Full-width button.
   * @param {string} variant  'primary' | 'secondary' | 'ghost' | 'danger'
   */
  c.btn = function (theme, label, onClickFn, variant, extraStyle) {
    var base = 'width:100%;padding:14px;border-radius:' + R.md + ';font-size:' + T.sz.md + ';' +
      'font-weight:' + T.wt.bold + ';cursor:pointer;font-family:' + T.sans + ';';
    var v = variant || 'primary';
    var styles = {
      primary:   base + 'border:none;background:' + theme.primary + ';color:white;box-shadow:' + shadow(theme, 'primary') + ';',
      secondary: base + 'border:1.5px solid ' + theme.border + ';background:transparent;color:' + theme.text + ';',
      ghost:     base + 'border:1.5px solid ' + theme.secondary + ';background:transparent;color:' + theme.secondary + ';font-size:' + T.sz.base + ';',
      danger:    base + 'border:none;background:' + theme.error + ';color:white;'
    };
    return '<button onclick="' + onClickFn + '" style="' + (styles[v] || styles.primary) + (extraStyle || '') + '">' + label + '</button>';
  };

  /** Small pill button (inline use, not full-width) */
  c.btnSmall = function (theme, label, onClickFn, variant) {
    var isPrimary = variant === 'primary';
    return '<button onclick="' + onClickFn + '" style="padding:6px 14px;border-radius:' + R.pill + ';' +
      'font-size:12px;font-weight:' + T.wt.semi + ';cursor:pointer;font-family:' + T.sans + ';' +
      'border:1.5px solid ' + (isPrimary ? theme.primary : theme.border) + ';' +
      'background:' + (isPrimary ? theme.primary : 'transparent') + ';' +
      'color:' + (isPrimary ? 'white' : theme.text) + '">' + label + '</button>';
  };


  /* ── Form inputs ────────────────────────────────────────── */

  c.inputLabel = function (theme, text) {
    return '<div style="font-size:12px;font-weight:' + T.wt.semi + ';color:' + theme.text + ';margin-bottom:6px">' + text + '</div>';
  };

  c.input = function (theme, id, type, placeholder, value) {
    return '<input type="' + type + '" id="' + id + '" placeholder="' + placeholder + '" value="' + (value || '') + '" ' +
      'style="width:100%;padding:13px 16px;border-radius:' + R.md + ';border:1.5px solid ' + theme.border + ';' +
      'background:' + theme.input + ';font-size:14px;font-family:' + T.sans + ';color:' + theme.text + ';outline:none;display:block">';
  };

  /** Label + input combined */
  c.field = function (theme, id, type, labelText, placeholder, value) {
    return c.inputLabel(theme, labelText) + c.input(theme, id, type, placeholder, value);
  };


  /* ── Pills & chips ──────────────────────────────────────── */

  /** Generic filter chip */
  c.chip = function (theme, label, active, onClickFn) {
    return '<span ' + (onClickFn ? 'onclick="' + onClickFn + '"' : '') + ' style="font-size:' + T.sz.sm + ';' +
      'padding:5px 13px;border-radius:' + R.pill + ';background:' + (active ? theme.primary : theme.chip) + ';' +
      'color:' + (active ? 'white' : theme.chipTx) + ';font-weight:' + (active ? T.wt.semi : T.wt.reg) + ';' +
      'white-space:nowrap;' + (onClickFn ? 'cursor:pointer;' : '') + '">' + label + '</span>';
  };

  /** Dietary preference tag (with checkmark when selected) */
  c.dietTag = function (theme, label, selected, onClickFn) {
    return '<span ' + (onClickFn ? 'onclick="' + onClickFn + '"' : '') + ' style="font-size:11px;' +
      'padding:7px 14px;border-radius:' + R.pill + ';cursor:pointer;' +
      'border:1.5px solid ' + (selected ? theme.primary : theme.border) + ';' +
      'background:' + (selected ? theme.primary : theme.chip) + ';' +
      'color:' + (selected ? 'white' : theme.chipTx) + '">' +
      (selected ? '✓ ' : '') + label + '</span>';
  };

  /** "Saved from TikTok / Instagram" provenance badge */
  c.sourceBadge = function (theme, platform) {
    return '<span style="display:inline-flex;align-items:center;gap:3px;font-size:9px;' +
      'padding:3px 9px;border-radius:' + R.pill + ';background:' + theme.chip + ';' +
      'color:' + theme.secondary + ';font-weight:' + T.wt.semi + ';border:0.5px solid ' + theme.border + '">' +
      '<svg width="7" height="7" viewBox="0 0 24 24" fill="' + theme.secondary + '"><path d="M5 3l14 9-14 9V3z"/></svg>' +
      (platform || 'Social') + '</span>';
  };

  /** Row of metadata chips (time, servings, difficulty) */
  c.metaRow = function (theme, items) {
    return '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
      items.map(function (item) {
        return '<span style="font-size:' + T.sz.xs + ';padding:4px 10px;border-radius:' + R.pill + ';' +
          'background:' + theme.chip + ';color:' + theme.chipTx + '">' + item + '</span>';
      }).join('') + '</div>';
  };


  /* ── Recipe cards ───────────────────────────────────────── */

  /**
   * Large featured recipe card (hero image + info strip).
   * recipe: { title, image?, heroColor?, time?, rating?, difficulty?, source? }
   */
  c.recipeCardLarge = function (theme, recipe, onClickFn) {
    var bg = recipe.image ?
      'background:url(\'' + recipe.image + '\') center/cover no-repeat' :
      'background:' + (recipe.heroColor || theme.hero);
    var click = onClickFn ? 'onclick="' + onClickFn + '"' : '';
    return '<div ' + click + ' style="border-radius:' + R.lg + ';overflow:hidden;border:0.5px solid ' + theme.border + ';' +
      (onClickFn ? 'cursor:pointer;' : '') + 'box-shadow:' + shadow(theme, 'md') + '">' +
      '<div style="height:120px;' + bg + ';position:relative;display:flex;align-items:center;justify-content:center">' +
        (!recipe.image ? '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>' : '') +
        '<div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.4) 0%,transparent 55%)"></div>' +

  c.toast = function (theme, message) {

          (suggestion ? '<div style="font-size:11px;color:' + theme.muted + ';margin-bottom:8px">Swap: <strong style="color:' + theme.text + '">' + suggestion + '</strong></div>' : '') +
          (onAcceptFn ? c.btnSmall(theme, 'Accept swap', onAcceptFn, 'primary') : '') +

  /** Cooking step card (used in step-by-step cooking mode) */
  c.cookingStepCard = function (theme, step) {
    return '<div style="border-radius:' + R.xl + ';background:' + theme.card + ';border:0.5px solid ' + theme.border + ';' +
      'padding:24px;box-shadow:' + shadow(theme, 'md') + '">' +

      '<div style="text-align:center;margin-bottom:8px">' +
        '<span style="background:' + theme.primary + ';color:white;border-radius:' + R.xs + ';' +

      (step.time ? '<div style="display:flex;justify-content:center">' +
        '<div style="display:inline-flex;align-items:center;gap:6px;background:' + theme.chip + ';border-radius:' + R.pill + ';padding:6px 16px">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="' + theme.primary + '" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' +

        '</div></div>' : '') +

  };

  /** Bottom sheet panel (overlays from bottom, use inside a scrim) */
  c.bottomSheet = function (theme, title, content) {
    return '<div style="width:100%;background:' + theme.card + ';border-radius:' + R.xl + ' ' + R.xl + ' 0 0;padding:20px 22px 40px">' +
      '<div style="width:40px;height:4px;border-radius:' + R.pill + ';background:' + theme.border + ';margin:0 auto 16px"></div>' +
      (title ? '<div style="font-size:17px;font-weight:' + T.wt.bold + ';color:' + theme.text + ';margin-bottom:16px;font-family:' + T.serif + '">' + title + '</div>' : '') +
      content + '</div>';
  };


  /* ══════════════════════════════════════════════════════════
     NAVIGATION SYSTEM
     OT.nav(screenMap, startScreenId, containerId, options)

     screenMap:  { screenId: function(theme, state){return html} }
     startId:    first screen to show
     containerId: id of the div that receives screen HTML
     options: {
       mainScreens: ['home','search',...],  // get fade-up anim
       onRender: function(state, theme){},  // called after each render
       state: { ...extra initial state }    // merged into nav state
     }

     Exposes globals: otGo(screenId), otBack(), otToggleTheme(),
                      otState, otRender(), otTheme()
  ══════════════════════════════════════════════════════════ */

  function nav(screenMap, startId, containerId, options) {
    var opts  = options || {};
    var elId  = containerId || 'phone-screen';
    var state = { cur: startId || Object.keys(screenMap)[0], hist: [], dark: false };
    if (opts.state) {
      for (var k in opts.state) state[k] = opts.state[k];
    }

    function theme() { return state.dark ? D : L; }

    function render(anim) {
      var el = document.getElementById(elId);
      if (!el) return;
      var wrap = document.createElement('div');
      wrap.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
      if (anim) wrap.className = anim;
      var fn = screenMap[state.cur];
      wrap.innerHTML = fn ? fn(theme(), state) : '<div style="padding:40px;color:red">Screen not found: ' + state.cur + '</div>';
      el.innerHTML = '';
      el.appendChild(wrap);
      el.style.background = theme().bg;
      if (opts.onRender) opts.onRender(state, theme());
    }

    function go(screenId, back) {
      if (screenId === state.cur) return;
      if (!back) state.hist.push(state.cur);
      state.cur = screenId;
      var mains = opts.mainScreens || [];
      var anim  = back ? 'anim-back' : (mains.indexOf(screenId) >= 0 ? 'anim-up' : 'anim-forward');
      render(anim);
    }

    window.otGo          = go;
    window.otBack        = function () { if (state.hist.length) { state.cur = state.hist.pop(); render('anim-back'); } };
    window.otToggleTheme = function () { state.dark = !state.dark; render(); };
    window.otState       = state;
    window.otRender      = render;
    window.otTheme       = theme;

    injectAnimations();
    render('anim-up');
    return { go: go, state: state, theme: theme, render: render };
  }


  /* ══════════════════════════════════════════════════════════
     CSS ANIMATIONS  (injected once per page)
  ══════════════════════════════════════════════════════════ */

  function injectAnimations() {
    if (document.getElementById('ot-anim')) return;
    var s = document.createElement('style');
    s.id = 'ot-anim';
    s.textContent =
      '@keyframes slideFromRight{from{transform:translateX(100%);opacity:.6}to{transform:translateX(0);opacity:1}}' +
      '@keyframes slideFromLeft{from{transform:translateX(-100%);opacity:.6}to{transform:translateX(0);opacity:1}}' +
      '@keyframes fadeScaleUp{from{opacity:0;transform:scale(.97) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}' +
      '@keyframes scanLine{0%{top:0}100%{top:calc(100% - 3px)}}' +
      '@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(12px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}78%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-5px)}}' +
      '.anim-forward{animation:slideFromRight .3s cubic-bezier(.25,.46,.45,.94)}' +
      '.anim-back{animation:slideFromLeft .3s cubic-bezier(.25,.46,.45,.94)}' +
      '.anim-up{animation:fadeScaleUp .35s cubic-bezier(.16,1,.3,1)}';
    document.head.appendChild(s);
  }


  /* ══════════════════════════════════════════════════════════
     EXPORT
  ══════════════════════════════════════════════════════════ */

  global.OT = {
    L: L,          // light theme
    D: D,          // dark theme
    T: T,          // typography
    S: S,          // spacing
    R: R,          // border radius
    shadow: shadow,
    c: c,          // all component functions
    nav: nav,      // navigation system factory
    injectAnimations: injectAnimations
  };

})(window);

</script>

<script>
// ═══════════════════════════════════════════════════
// HUB CONTROLLER
// ═══════════════════════════════════════════════════
var MODULE_DEFS  = {};
var MODULE_INSTS = {};
var ACTIVE_KEY   = null;

var SCREEN_NAMES = {
  welcome:'Welcome',signIn:'Sign In',forgotPassword:'Forgot Password',
  createAccount:'Create Account',householdSetup:'Household Setup',
  dietPrefs:'Dietary Prefs',complete:'All Set! 🎉',
  home:'Home',search:'Search',searchResults:'Search Results',library:'Library',
  recipe:'Recipe Preview',fridge:'Fridge',list:'Grocery List',profile:'Profile',
  recipeDetail:'Recipe Detail',conflictDetail:'Dietary Conflicts',
  cookingMode:'Cooking Mode',cookingDone:'Done! 🎉',
  addPicker:'Add Recipe',urlImport:'URL Import',urlParsing:'Parsing…',
  urlPreview:'Preview',socialImport:'Social Import',socialResult:'Social Result',
  socialPreview:'Social Preview',importDone:'Saved! ✓',manualEntry:'Manual Entry',
  fridgeHome:'Fridge',fridgeScan:'Scanning…',fridgeScanDone:'Scan Complete',
  pantryList:'Pantry',whatCanIMake:'What Can I Make',wasteMode:'Waste Mode',
  groceryList:'Grocery List',aisleView:'By Aisle',selectRecipes:'Add Recipes',listDone:'List Done',
  householdDash:'My Household',memberDetail:'Member Detail',appSettings:'App Settings',
  notifications:'Notifications',subscription:'Our Table Plus',editProfile:'Edit Profile',
  bookCover:'Recipe Book',bookChapter:'Chapter',bookRecipe:'Book Recipe',
  partyMode:'Party Mode',printExport:'Print & Export',
  mealPlan:'Meal Planner',mealPickRecipe:'Pick a Recipe',mealGenerate:'Generating Plan…',mealDay:'Today\'s Meals'
};

var META = [
  {key:'01_auth',num:'01',title:'Onboarding',icon:'🚪',sub:'Auth & Setup'},
  {key:'02_home',num:'02',title:'Home',icon:'🏠',sub:'Search & Library'},
  {key:'03_recipe',num:'03',title:'Recipe Detail',icon:'🍽️',sub:'Cooking Mode'},
  {key:'04_add',num:'04',title:'Add Recipe',icon:'➕',sub:'Import Flow'},
  {key:'05_fridge',num:'05',title:'Fridge & Pantry',icon:'❄️',sub:'What Can I Make'},
  {key:'06_grocery',num:'06',title:'Grocery List',icon:'🛒',sub:'Smart Shopping'},
  {key:'07_profile',num:'07',title:'Profile',icon:'👤',sub:'Settings & Plan'},
  {key:'08_book',num:'08',title:'Recipe Book',icon:'📚',sub:'Family Heirloom'},
  {key:'09_mealplan',num:'09',title:'Meal Planner',icon:'📅',sub:'Weekly Planning'}
];

function updateHubLabel(state, theme) {
  var el  = document.getElementById('screen-label');
  var btn = document.getElementById('theme-btn');
  if (el)  el.textContent  = SCREEN_NAMES[state.cur] || state.cur || '—';
  if (btn) btn.textContent = (theme && theme._name === 'dark') ? '☀ Light' : '☾ Dark';
}

// Patch OT.nav so every module re-render also updates the hub label
var _realNav = OT.nav;
OT.nav = function patchedNav(screenMap, startId, containerId, opts) {
  opts = opts || {};
  var _orig = opts.onRender;
  opts.onRender = function(state, theme) {
    if (_orig) _orig(state, theme);
    updateHubLabel(state, theme);
  };
  var inst = _realNav(screenMap, startId, 'phone-screen', opts);
  if (ACTIVE_KEY) MODULE_INSTS[ACTIVE_KEY] = inst;
  return inst;
};

function loadModule(key) {
  if (ACTIVE_KEY === key) return;
  ACTIVE_KEY = key;
  document.querySelectorAll('.module-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.key === key);
  });
  // Re-run module factory — this calls OT.nav (patched) which boots into #phone-screen
  if (MODULE_DEFS[key]) MODULE_DEFS[key]();
}

// Cross-module nav bar router
window.otNavBar = function(id) {
  var tabMap = {
    home:    {mod:'02_home',    screen:'home'},
    search:  {mod:'02_home',    screen:'search'},
    library: {mod:'02_home',    screen:'library'},
    fridge:  {mod:'05_fridge',  screen:'fridgeHome'},
    list:    {mod:'06_grocery', screen:'groceryList'},
    profile: {mod:'07_profile', screen:'profile'}
  };
  var t = tabMap[id];
  if (!t) { if (window.otGo) window.otGo(id); return; }
  if (t.mod === ACTIVE_KEY) {
    window.otGo(t.screen);
  } else {
    loadModule(t.mod);
    setTimeout(function() { if (window.otGo) window.otGo(t.screen); }, 80);
  }
};

// Build sidebar buttons
var grid = document.getElementById('module-grid');
META.forEach(function(m) {
  var btn = document.createElement('button');
  btn.className   = 'module-btn';
  btn.dataset.key = m.key;
  btn.innerHTML   =
    '<span class="mod-num">'+m.num+'</span>'+
    '<span class="mod-icon">'+m.icon+'</span>'+
    '<span class="mod-info"><div class="mod-title">'+m.title+'</div><div class="mod-sub">'+m.sub+'</div></span>'+
    '<span class="mod-arrow">›</span>';
  btn.addEventListener('click', function(){ loadModule(m.key); });
  grid.appendChild(btn);
});

// Auto-boot
document.addEventListener('DOMContentLoaded', function() {
  loadModule('01_auth');
});
</script>

  /* ── 2. FRIDGE SCAN (camera view) ───────────────────────── */

        '<div style="position:absolute;inset:0;opacity:0.15;' +
          'background-image:linear-gradient(rgba(255,255,255,0.5) 1px,transparent 1px),'+
          'linear-gradient(90deg,rgba(255,255,255,0.5) 1px,transparent 1px);'+
          'background-size:33.3% 33.3%"></div>' +

        /* Scan line animation */
        '<div style="position:absolute;left:10%;right:10%;top:20%;bottom:20%;'+
          'border:2px solid rgba(255,255,255,0.6);border-radius:'+R.lg+'">' +

          /* Corner accents */
          '<div style="position:absolute;top:-2px;left:-2px;width:24px;height:24px;'+
            'border-top:3px solid '+th.secondary+';border-left:3px solid '+th.secondary+'"></div>' +
          '<div style="position:absolute;top:-2px;right:-2px;width:24px;height:24px;'+
            'border-top:3px solid '+th.secondary+';border-right:3px solid '+th.secondary+'"></div>' +
          '<div style="position:absolute;bottom:-2px;left:-2px;width:24px;height:24px;'+
            'border-bottom:3px solid '+th.secondary+';border-left:3px solid '+th.secondary+'"></div>' +
          '<div style="position:absolute;bottom:-2px;right:-2px;width:24px;height:24px;'+
            'border-bottom:3px solid '+th.secondary+';border-right:3px solid '+th.secondary+'"></div>' +

          /* Scan beam */
          '<div style="position:absolute;left:0;right:0;height:2px;top:40%;'+
            'background:linear-gradient(90deg,transparent,'+th.secondary+',transparent);'+
            'animation:scanLine 2s ease-in-out infinite"></div>' +

          /* Instruction text */
          '<div style="position:absolute;bottom:14px;left:0;right:0;text-align:center;'+
            'font-size:12px;color:rgba(255,255,255,0.8);font-weight:'+T.wt.semi+'">'+
            'Point at your open fridge' +
          '</div>' +
        '</div>' +

        /* Simulated fridge items being detected */
        (scanning ? '' :
          '<div style="position:absolute;left:10%;right:10%;top:22%;display:flex;flex-wrap:wrap;'+
            'gap:6px;padding:10px;justify-content:center">' +
            ['🐟 Salmon','🥛 Cream','🥬 Spinach','🍅 Tomatoes','🥚 Eggs','🧀 Cheese','🧈 Butter'].map(function (item) {
              return '<div style="background:rgba(0,0,0,0.6);border:1px solid rgba('+
                (th._name==='dark' ? '154,184,106' : '90,138,82')+',0.7);border-radius:'+R.pill+';'+
                'padding:4px 10px;font-size:10px;color:white;backdrop-filter:blur(4px)">'+item+'</div>';
            }).join('') +
          '</div>'
        ) +

      '</div>' +

      /* Top bar overlay */
      c.notch() +
      '<div style="position:absolute;top:0;left:0;right:0;z-index:20;'+
        'padding:38px '+S.xl+' 12px;display:flex;justify-content:space-between;align-items:center">' +
        /* Close */
        '<div onclick="otBack()" style="width:36px;height:36px;border-radius:50%;'+
          'background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer">'+
          iconSvg('M18 6L6 18M6 6l12 12', 18, 'white', '2') +
        '</div>' +
        '<div style="font-size:13px;font-weight:'+T.wt.bold+';color:white">Fridge Scanner</div>' +
        /* Flash */
        '<div onclick="return false" style="width:36px;height:36px;border-radius:50%;'+
          'background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer">'+
          '<span style="font-size:18px">⚡</span>' +
        '</div>' +
      '</div>' +

      /* Bottom controls */
      '<div style="position:absolute;bottom:0;left:0;right:0;z-index:20;'+
        'padding:20px '+S.xl+' 36px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent)">' +

        /* Detected count */
        '<div style="text-align:center;margin-bottom:16px">' +
          '<div style="display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,0.6);'+
            'border-radius:'+R.pill+';padding:6px 18px;border:1px solid rgba(255,255,255,0.2)">' +
            '<div style="width:8px;height:8px;border-radius:50%;background:'+th.secondary+';'+

        /* Shutter button */
        '<div style="display:flex;align-items:center;justify-content:center;gap:28px">' +
          /* Gallery */
          '<div onclick="return false" style="width:42px;height:42px;border-radius:'+R.sm+';'+
            'background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer">'+
            iconSvg('M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM8.5 10a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm10.5 6H5l4-5 3 3.5 3-3 5 4.5z', 20, 'white') +
          '</div>' +
          /* Shutter */
          '<div onclick="otGo(\'fridgeScanDone\')" style="width:72px;height:72px;border-radius:50%;'+
            'background:white;border:4px solid rgba(255,255,255,0.4);cursor:pointer;'+
            'display:flex;align-items:center;justify-content:center">' +
            '<div style="width:56px;height:56px;border-radius:50%;background:white;'+
              'box-shadow:inset 0 0 0 3px rgba(0,0,0,0.1)"></div>' +
          '</div>' +
          /* Flip camera */
          '<div onclick="return false" style="width:42px;height:42px;border-radius:50%;'+
            'background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer">'+
            iconSvg('M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15', 20, 'white') +
          '</div>' +
        '</div>' +

      '</div>' +
    '</div>';
  }

  window.otCheckItem = function (id) {
    var overrides = otState.itemOverrides || {};
    var current   = ALL_ITEMS.find ? ALL_ITEMS.find(function (i) { return i.id===id; }) : null;
    // fallback for older browsers
    if (!current) { for (var k=0;k<ALL_ITEMS.length;k++) { if (ALL_ITEMS[k].id===id) { current=ALL_ITEMS[k]; break; } } }
    var wasChecked = overrides[id] !== undefined ? overrides[id] : current.checked;
    overrides[id] = !wasChecked;
    otState.itemOverrides = overrides;
    otRender();
  };

  window.otClearChecked = function () {
    var overrides = {};
    getItems().forEach(function (item) {
      if (!item.checked) overrides[item.id] = false;
      else overrides[item.id] = false;  // uncheck all
    });
    otState.itemOverrides = overrides;
    otRender();
  };

  window.otToggleRecipe = function (title) {
    var arr = otState.addedRecipes || [];
    var idx = arr.indexOf(title);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(title);
    otState.addedRecipes = arr;
    otRender();
  };

    if (id === 'list') { otGo('groceryList'); return; }
    otGo(id);

  MODULE_DEFS['09_mealplan'] = function() {

      { id:4, title:'Greek Yogurt Bowl',     emoji:'🫙', time:'5 min',  tags:['Breakfast','Healthy'],   color:'#4A5E8C' },
      { id:5, title:'Caprese Salad',         emoji:'🍅', time:'10 min', tags:['Lunch','Vegetarian'],    color:'#8C3D3D' },
      { id:6, title:'Overnight Oats',        emoji:'🥣', time:'5 min',  tags:['Breakfast','Prep Ahead'],color:'#7A6B3D' },
      { id:7, title:'Turkey Tacos',          emoji:'🌮', time:'30 min', tags:['Dinner','Family'],       color:'#6B4A1E' },
      { id:8, title:'Veggie Pasta',          emoji:'🍝', time:'25 min', tags:['Dinner','Vegetarian'],   color:'#5C3D6B' },
      { id:9, title:'Smoothie Bowl',         emoji:'🍓', time:'10 min', tags:['Breakfast','Healthy'],   color:'#8C3D5C' },
      { id:10,title:'Caesar Salad',          emoji:'🥗', time:'15 min', tags:['Lunch','Quick'],         color:'#3D5C4A' }
    ];

    var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var MEALS = ['Breakfast','Lunch','Dinner'];

    /* Auto-generate a full week plan from saved recipes */
    function autoGenPlan() {
      var plan = {};
      DAYS.forEach(function(day) {
        plan[day] = {};
        MEALS.forEach(function(meal, mi) {
          var idx = (DAYS.indexOf(day) * 3 + mi) % SAVED_RECIPES.length;
          plan[day][meal] = SAVED_RECIPES[idx];
        });
      });
      return plan;
    }

    /* ── SCREEN 1: MEAL PLANNER (weekly grid) ── */
    function sMealPlan(th, st) {
      var plan     = st.mealPlan || {};
      var viewMode = st.mealViewMode || 'grid'; /* grid | list */
      var today    = DAYS[new Date().getDay()];
      var isDark   = th._name === 'dark';

      /* Calories summary (mock) */
      var totalMeals = 0;
      DAYS.forEach(function(d){ MEALS.forEach(function(m){ if (plan[d] && plan[d][m]) totalMeals++; }); });

      return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
        'position:relative;font-family:' + T.sans + '">' +

        c.notch() + c.statusBar(th) +

        /* ── Header ── */
        '<div style="padding:4px ' + S.xl + ' 10px;flex-shrink:0">' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
            '<div>' +
              '<div style="font-size:22px;font-weight:' + T.wt.heavy + ';color:' + th.text + ';font-family:' + T.serif + '">This Week</div>' +
              '<div style="font-size:12px;color:' + th.muted + ';margin-top:1px">' + totalMeals + ' of 21 meals planned</div>' +
            '</div>' +
            /* View toggle */
            '<div style="display:flex;background:' + th.chip + ';border-radius:' + R.md + ';padding:3px;gap:2px">' +
              '<div onclick="otState.mealViewMode=\'grid\';otRender()" style="padding:6px 10px;border-radius:8px;cursor:pointer;' +
                'background:' + (viewMode==='grid' ? th.card : 'transparent') + ';' +
                'box-shadow:' + (viewMode==='grid' ? '0 1px 3px rgba(0,0,0,0.12)' : 'none') + '">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="' + (viewMode==='grid' ? th.primary : th.muted) + '" stroke-width="2.5">' +

      return DAYS.map(function(day) {
        var isToday = day === today;
        return '<div style="margin-bottom:14px">' +
          /* Day header */
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">' +

            '<div style="flex:1;height:1px;background:' + th.border + '"></div>' +
          '</div>' +
          /* 3 meal slots side by side */
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">' +
            MEALS.map(function(meal) {
              var recipe = plan[day] && plan[day][meal];
              return mealSlotCard(th, day, meal, recipe, isDark);
            }).join('') +
          '</div>' +
        '</div>';
      }).join('');
    }

            (isToday ? '<div style="background:' + th.primary + ';color:white;font-size:9px;font-weight:' + T.wt.bold + ';padding:2px 7px;border-radius:' + R.pill + '">TODAY</div>' : '') +
            '<div style="flex:1;height:1px;background:' + th.border + '"></div>' +

                ? '<span style="font-size:16px">' + recipe.emoji + '</span>' +
                  '<div style="flex:1">' +
                    '<div style="font-size:13px;font-weight:' + T.wt.bold + ';color:' + th.text + '">' + recipe.title + '</div>' +
                    '<div style="font-size:11px;color:' + th.muted + '">' + recipe.time + '</div>' +
                  '</div>' +
                  '<div onclick="event.stopPropagation();otMealClear(\'' + day + '\',\'' + meal + '\')" ' +
                    'style="width:22px;height:22px;border-radius:50%;background:' + th.chip + ';display:flex;align-items:center;justify-content:center;cursor:pointer">' +
                    '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
                  '</div>'
                : '<div style="flex:1;font-size:12px;color:' + th.muted + ';font-style:italic">Tap to add a meal…</div>' +
                  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
              ) +
            '</div>';
          }).join('') +
        '</div>';
      }).join('');
    }

    /* ── Individual meal slot card (grid view) ── */
    function mealSlotCard(th, day, meal, recipe, isDark) {
      var isEmpty = !recipe;
      return '<div onclick="otMealSlotTap(\'' + day + '\',\'' + meal + '\')" ' +
        'style="border-radius:' + R.md + ';overflow:hidden;cursor:pointer;position:relative;' +
        'border:' + (isEmpty ? '1.5px dashed ' + th.border : '0.5px solid ' + th.border) + ';' +
        'background:' + (isEmpty ? 'transparent' : th.card) + ';min-height:80px">' +

        (isEmpty
          ? /* Empty slot */
            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80px;gap:4px">' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + th.border + '" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
              '<div style="font-size:9px;color:' + th.border + ';font-weight:' + T.wt.semi + ';text-align:center;padding:0 4px">' + meal + '</div>' +
            '</div>'
          : /* Filled slot */
            '<div style="padding:8px 7px">' +
              '<div style="font-size:10px;font-weight:' + T.wt.semi + ';color:' + th.muted + ';margin-bottom:4px">' + meal.toUpperCase() + '</div>' +
              '<div style="font-size:20px;margin-bottom:3px">' + recipe.emoji + '</div>' +
              '<div style="font-size:10px;font-weight:' + T.wt.bold + ';color:' + th.text + ';line-height:1.3;margin-bottom:4px">' + recipe.title + '</div>' +
              '<div style="font-size:9px;color:' + th.muted + '">' + recipe.time + '</div>' +
              /* Clear X */
              '<div onclick="event.stopPropagation();otMealClear(\'' + day + '\',\'' + meal + '\')" ' +
                'style="position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;' +
                'background:' + th.chip + ';display:flex;align-items:center;justify-content:center;cursor:pointer">' +
                '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
              '</div>' +
            '</div>'
        ) +
      '</div>';
    }

    /* ── SCREEN 2: PICK A RECIPE ── */
    function sMealPickRecipe(th, st) {
      var day    = st.mealPickDay  || 'Mon';
      var meal   = st.mealPickMeal || 'Dinner';
      var filter = st.mealPickFilter || 'All';
      var tags   = ['All','Breakfast','Lunch','Dinner','Quick','Vegetarian','High Protein'];

      var filtered = filter === 'All' ? SAVED_RECIPES :
        SAVED_RECIPES.filter(function(r){ return r.tags.indexOf(filter) > -1; });

      return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
        'position:relative;font-family:' + T.sans + '">' +

        c.notch() + c.statusBar(th) +

        '<div style="padding:4px ' + S.xl + ' 12px;flex-shrink:0">' +
          c.backBtn(th, 'Meal Planner') +
          '<div style="margin-top:6px">' +
            '<div style="font-size:20px;font-weight:' + T.wt.heavy + ';color:' + th.text + ';font-family:' + T.serif + '">Pick a Recipe</div>' +
            '<div style="font-size:12px;color:' + th.muted + ';margin-top:2px">' + day + ' · ' + meal + '</div>' +
          '</div>' +

          /* Filter pills */
          '<div style="display:flex;gap:6px;overflow-x:auto;padding:10px 0 0;scrollbar-width:none;margin:0 -' + S.xl + ';padding-left:' + S.xl + '">' +
            tags.map(function(tag) {
              var active = filter === tag;
              return '<div onclick="otState.mealPickFilter=\'' + tag + '\';otRender()" ' +
                'style="flex-shrink:0;padding:6px 12px;border-radius:' + R.pill + ';cursor:pointer;font-size:12px;font-weight:' + T.wt.semi + ';' +
                'background:' + (active ? th.primary : th.chip) + ';color:' + (active ? 'white' : th.muted) + '">' +
                tag +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>' +

        '<div style="flex:1;overflow-y:auto;padding:4px ' + S.xl + ' 90px;scrollbar-width:none">' +
          /* Recipe list */
          filtered.map(function(recipe) {
            return '<div onclick="otMealPickRecipe(' + recipe.id + ')" ' +
              'style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;' +
              'background:' + th.card + ';border:0.5px solid ' + th.border + ';border-radius:' + R.lg + ';cursor:pointer">' +
              /* Emoji avatar */
              '<div style="width:46px;height:46px;border-radius:' + R.md + ';background:' + recipe.color + '20;' +
                'display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">' +
                recipe.emoji +
              '</div>' +
              '<div style="flex:1">' +
                '<div style="font-size:14px;font-weight:' + T.wt.bold + ';color:' + th.text + '">' + recipe.title + '</div>' +
                '<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">' +
                  '<span style="font-size:10px;color:' + th.muted + '">' + recipe.time + '</span>' +
                  recipe.tags.map(function(tag) {
                    return '<span style="font-size:10px;padding:1px 7px;border-radius:' + R.pill + ';background:' + th.chip + ';color:' + th.muted + '">' + tag + '</span>';
                  }).join('') +
                '</div>' +
              '</div>' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="' + th.muted + '" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>' +
            '</div>';
          }).join('') +
        '</div>' +
      '</div>';
    }

    /* ── SCREEN 3: GENERATING (animation screen) ── */
    function sMealGenerate(th) {
      var steps = [
        { label:'Scanning your saved recipes…', done:true,  active:false },
        { label:'Checking dietary preferences…', done:true,  active:false },
        { label:'Balancing nutrition across the week…', done:false, active:true  },
        { label:'Building your grocery list…', done:false, active:false }
      ];
      return '<div style="height:100%;background:' + th.bg + ';display:flex;flex-direction:column;' +
        'align-items:center;justify-content:center;font-family:' + T.sans + ';padding:40px;text-align:center">' +
        c.notch() +
        '<div style="font-size:56px;margin-bottom:24px">✨</div>' +
        '<div style="font-size:22px;font-weight:' + T.wt.heavy + ';color:' + th.text + ';font-family:' + T.serif + ';margin-bottom:8px">Building Your Week</div>' +
        '<div style="font-size:13px;color:' + th.muted + ';margin-bottom:36px;line-height:1.6">Finding the best combinations from your saved recipes…</div>' +
        '<div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:14px;margin-bottom:40px">' +
          steps.map(function(s) {
            return '<div style="display:flex;align-items:center;gap:12px">' +
              '<div style="width:22px;height:22px;border-radius:50%;flex-shrink:0;' +
                'background:' + (s.done ? th.secondary : s.active ? th.primary : th.chip) + ';' +
                'display:flex;align-items:center;justify-content:center">' +
                (s.done ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
                        : s.active ? '<div style="width:8px;height:8px;border-radius:50%;background:white"></div>' : '') +
              '</div>' +
              '<span style="font-size:13px;color:' + (s.active ? th.text : s.done ? th.muted : th.border) + ';' +
                'font-weight:' + (s.active ? T.wt.bold : T.wt.reg) + ';text-align:left">' + s.label + '</span>' +
            '</div>';
          }).join('') +
        '</div>' +
        c.btn(th, 'Done — Show My Plan', "otMealGenerateDone()", 'primary') +
      '</div>';
    }

    /* ── HANDLERS ── */
    window.otMealSlotTap = function(day, meal) {
      otState.mealPickDay  = day;
      otState.mealPickMeal = meal;
      otState.mealPickFilter = 'All';
      otGo('mealPickRecipe');
    };

    window.otMealPickRecipe = function(recipeId) {
      var recipe = SAVED_RECIPES.filter(function(r){ return r.id === recipeId; })[0];
      if (!recipe) return;
      var day  = otState.mealPickDay;
      var meal = otState.mealPickMeal;
      if (!otState.mealPlan) otState.mealPlan = {};
      if (!otState.mealPlan[day]) otState.mealPlan[day] = {};
      otState.mealPlan[day][meal] = recipe;
      otBack();
    };

    window.otMealClear = function(day, meal) {
      if (otState.mealPlan && otState.mealPlan[day]) {
        delete otState.mealPlan[day][meal];
        otRender();
      }
    };

    window.otMealAutoGenerate = function() {
      otGo('mealGenerate');
    };

    window.otMealGenerateDone = function() {
      otState.mealPlan = autoGenPlan();
      otBack();
    };

    /* ── NAV REGISTRATION ── */
    OT.nav(
      {
        mealPlan:        sMealPlan,
        mealPickRecipe:  sMealPickRecipe,
        mealGenerate:    sMealGenerate
      },
      'mealPlan',
      'phone-screen',
      {
        mainScreens: ['mealPlan'],
        state: {
          mealPlan:        {},
          mealViewMode:    'grid',
          mealPickDay:     'Mon',
          mealPickMeal:    'Dinner',
          mealPickFilter:  'All'
        },
        onRender: function(st, th) {
          var lbl = document.getElementById('screen-label');
          if (lbl) lbl.textContent = SCREEN_NAMES[st.cur] || st.cur;
        }
      }
    );

  };


})();
</script>

</body>
</html>
